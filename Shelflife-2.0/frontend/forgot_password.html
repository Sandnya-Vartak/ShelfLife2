<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShelfLife | Forgot Password</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/forms.css">
</head>
<body class="auth-body">
    <main class="auth-layout">
        <section class="auth-panel auth-brand-panel">
            <div class="brand-mark large-mark">
                <img src="../assets/logo.svg" alt="ShelfLife logo">
            </div>
            <p class="section-tag">Password Reset</p>
            <h1 class="page-title">Recover your ShelfLife access</h1>
            <p class="page-copy">Request a secure reset link or set a new password once you have the token.</p>
        </section>

        <section class="auth-panel">
            <div class="card-heading">
                <h2>Forgot password</h2>
                <p>Enter your email to receive a reset link.</p>
            </div>

            <form class="app-form" id="forgot-password-form">
                <label class="field field-full">
                    <span>Email</span>
                    <input type="email" id="reset-email" name="email" placeholder="you@example.com" required>
                </label>
                <div class="form-actions">
                    <button type="submit" class="primary-btn">Send reset link</button>
                </div>
            </form>

            <form class="app-form" id="reset-password-form" hidden>
                <label class="field field-full">
                    <span>New password</span>
                    <input type="password" id="new-password" name="password" placeholder="New password" required>
                    <span class="field-hint">At least 8 characters and include letters.</span>
                </label>
                <label class="field field-full">
                    <span>Confirm password</span>
                    <input type="password" id="confirm-new-password" name="confirm_password" placeholder="Repeat password" required>
                </label>
                <input type="hidden" id="reset-token" name="token">
                <div class="field-note">
                    Password reset links expire after 60 minutes.
                </div>
                <div class="form-actions">
                    <button type="submit" class="primary-btn">Update password</button>
                    <button type="button" class="secondary-btn" id="back-to-request">Back</button>
                </div>
            </form>

            <div id="forgot-message" class="message" aria-live="polite"></div>
            <div class="auth-divider"><span>Need help?</span></div>
            <p class="switch-link">
                <a href="/login/">Return to login</a>
            </p>
        </section>
    </main>

    <script src="../js/forgotPassword.js"></script>
</body>
</html>
